# Nginx reverse proxy for ENCOGSYS (copy to /etc/nginx/sites-available/encogsys)
#
#   sudo cp deploy/nginx-encogsys.conf /etc/nginx/sites-available/encogsys
#   sudo ln -sf /etc/nginx/sites-available/encogsys /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue SSL:
#   sudo certbot --nginx -d www.encogsys.com -d encogsys.com

# Redirect apex → www
server {
    listen 80;
    listen [::]:80;
    server_name encogsys.com;
    return 301 https://www.encogsys.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.encogsys.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
