name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Require VPS secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$VPS_HOST" ]; then
            echo "::error::Missing secret VPS_HOST (your VPS IP or hostname)"
            missing=1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing secret VPS_SSH_KEY (private SSH key for the VPS)"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "Add these in GitHub → Settings → Secrets and variables → Actions:"
            echo "  VPS_HOST     = your VPS IP"
            echo "  VPS_SSH_KEY  = private key (full -----BEGIN ... -----END block)"
            echo "  VPS_USER     = root (optional; defaults to root)"
            echo ""
            echo "Also finish first-time VPS setup (clone app to /var/www/encogsys) before auto-deploy will work."
            exit 1
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -e
            APP_DIR=/var/www/encogsys
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "App not found at $APP_DIR. Run deploy/bootstrap.sh on the VPS first."
              exit 1
            fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart encogsys --update-env || pm2 start ecosystem.config.cjs
            pm2 save
