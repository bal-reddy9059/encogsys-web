name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR=/var/www/encogsys
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart encogsys --update-env || pm2 start ecosystem.config.cjs
            pm2 save
